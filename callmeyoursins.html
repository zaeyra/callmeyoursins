<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Heart Animation</title>

<style>
    body{
        margin:0;
        background:black;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Arial, sans-serif;
    }

    #ui{
        position:relative;
        width:600px;
        height:600px;
    }

    .love_word{
        position:absolute;
        color:#ed93da;
        font-size:14px;
        white-space:nowrap;
        text-shadow:0 0 10px #ff6bb5;
        pointer-events:none;
    }
</style>
</head>

<body>

<div id="ui"></div>

<script>

const container = document.getElementById("ui");
const text = "i love you bb";

/* heart formula */
function heart(t){

    return{
        x: 16 * Math.pow(Math.sin(t),3),

        y:
        -(13 * Math.cos(t))
        + (5 * Math.cos(2*t))
        + (2 * Math.cos(3*t))
        + (Math.cos(4*t))
    };
}

let words = [];

/* create heart points */
for(let i=0; i<250; i++){

    let el = document.createElement("div");

    el.className = "love_word";
    el.innerText = text;

    container.appendChild(el);

    let t = (Math.PI * 2 * i) / 250;

    words.push({
        el:el,
        t:t
    });
}

/* animation */
function animate(){

    words.forEach((w,index)=>{

        let p = heart(w.t);

        let scale = 15;

        let x = p.x * scale + 300;
        let y = p.y * scale + 300;

        /* heartbeat effect */
        let pulse =
            1 + 0.05 * Math.sin(Date.now()/300 + index);

        w.el.style.left = x + "px";
        w.el.style.top = y + "px";

        w.el.style.transform =
            `translate(-50%, -50%) scale(${pulse})`;
    });

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
